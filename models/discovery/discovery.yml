version: 2

models:
  - name: pii_discovery
    description: >
      Undeclared-PII discovery. Column names from INFORMATION_SCHEMA across the
      configured datasets that match a PII name pattern but are NOT declared via
      `meta.pii`. Metadata only — reads column names, not row values. Surfaces the
      PII the registry can't see because it was never documented.
    tests:
      - chameleon_pii.no_undeclared_pii
    columns:
      - name: resource_id
        description: "Stable id, e.g. bigquery:project.dataset.table."
      - name: table_name
        description: Table the undeclared column lives in.
      - name: field_name
        description: The PII-looking, undeclared column.
      - name: classification
        description: Inferred classification from the column name.
        tests:
          - accepted_values:
              values: [DIRECT_IDENTIFIER, QUASI_IDENTIFIER, CONTACT, SENSITIVE, BEHAVIORAL, SYSTEM_IDENTIFIER]
      - name: detection_method
        description: Always INFORMATION_SCHEMA for this model.
        tests:
          - accepted_values:
              values: [INFORMATION_SCHEMA]
      - name: discovered_at
        description: When the discovery scan ran.
